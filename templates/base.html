<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary SEO Meta Tags -->
    <title>{% block title %}Ayush Kumar | Founder & CEO of Hoollow{% endblock %}</title>
    <meta name="title" content="{% block meta_title %}Ayush Kumar | Founder & CEO of Hoollow{% endblock %}">
    <meta name="description" content="{% block meta_description %}Portfolio of Ayush Kumar, 15-year-old AI/ML developer, full-stack programmer, and Founder & CEO of Hoollow.{% endblock %}">
    <meta name="robots" content="{% block robots %}index, follow{% endblock %}">
    <link rel="canonical" href="{{ site_url }}{% block canonical_path %}{{ request.path }}{% endblock %}">

    <!-- Open Graph / Facebook / Social SEO -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site_url }}{% block og_url_path %}{{ request.path }}{% endblock %}">
    <meta property="og:title" content="{% block og_title %}Ayush Kumar | Founder & CEO of Hoollow{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Portfolio of Ayush Kumar, 15-year-old AI/ML developer, full-stack programmer, and Founder & CEO of Hoollow.{% endblock %}">
    <meta property="og:image" content="{% block og_image %}{{ site_url }}/static/images/profile.png{% endblock %}">

    <!-- Twitter / X Card SEO -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="{{ site_url }}{% block twitter_url_path %}{{ request.path }}{% endblock %}">
    <meta name="twitter:title" content="{% block twitter_title %}Ayush Kumar | Founder & CEO of Hoollow{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}Portfolio of Ayush Kumar, 15-year-old AI/ML developer, full-stack programmer, and Founder & CEO of Hoollow.{% endblock %}">
    <meta name="twitter:image" content="{% block twitter_image %}{{ site_url }}/static/images/profile.png{% endblock %}">

    <!-- Favicon SEO & Manifest -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicons/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicons/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/favicons/apple-touch-icon.png">
    <link rel="manifest" href="/static/favicons/site.webmanifest">
    
    <!-- Fonts Preconnect & Load -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    
    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Ayush Kumar",
      "url": "{{ site_url }}",
      "image": "{{ site_url }}/static/images/profile.png",
      "sameAs": [
        "https://github.com/leuwenhoek",
        "https://buymeacoffee.com/leuwenhoek"
      ],
      "jobTitle": "Founder & CEO",
      "worksFor": {
        "@type": "Organization",
        "name": "Hoollow",
        "url": "https://hoollow.com"
      },
      "description": "15-year-old AI/ML developer, full-stack programmer, and Founder & CEO of Hoollow."
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Ayush Kumar Portfolio",
      "url": "{{ site_url }}",
      "description": "Portfolio of Ayush Kumar, Founder & CEO of Hoollow.",
      "publisher": {
        "@type": "Person",
        "name": "Ayush Kumar"
      }
    }
    </script>
    {% block additional_schema %}{% endblock %}

    <style>
        :root { --plum: #DDA0DD; --dark: #050505; }
        
        /* FIX: Ensure vertical scrolling works and horizontal is killed */
        html, body {
            margin: 0; padding: 0;
            width: 100%; min-height: 100%;
            overflow-x: hidden; overflow-y: auto;
            background-color: var(--dark);
            color: #f1f1f1;
            font-family: 'Outfit', sans-serif;
        }

        .font-serif { font-family: 'Playfair Display', serif; }
        .text-plum { color: var(--plum); }

        /* Glassmorphism Classes */
        .glass-header {
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-pill {
            background: rgba(221, 160, 221, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(221, 160, 221, 0.2);
        }

        .nav-link { 
            position: relative; font-size: 0.75rem; letter-spacing: 0.2em; 
            text-transform: uppercase; font-weight: 700; 
        }
        .nav-link:hover { color: var(--plum); }
    </style>
</head>
<body>

    <nav class="fixed top-4 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-7xl z-[100] glass-header rounded-full transition-all duration-300">
        <div class="px-6 py-3.5 md:px-8 flex justify-between items-center">
            <a href="/" class="text-xl md:text-2xl font-bold tracking-tighter z-[110]">leuwenhoek<span class="text-plum italic">.</span></a>
            
            <!-- Desktop Navigation Links (Visible on desktop) -->
            <div class="hidden md:flex space-x-10">
                <a href="/" class="nav-link">Home</a>
                <a href="/projects" class="nav-link">Projects</a>
                <a href="/stats" class="nav-link">Stats</a>
                <a href="/achievements" class="nav-link">Milestones</a>
                <a href="/gallery" class="nav-link">Gallery</a>
                <a href="https://linkify-nine-kappa.vercel.app/" target="_blank" rel="noopener noreferrer" class="nav-link">Connect</a>
            </div>
            
            <!-- Desktop Support Work Button -->
            <a href="/coffee" target="_blank" class="hidden md:inline-block glass-pill text-plum px-5 py-2 rounded-full text-[10px] hover:animate-pulse font-bold uppercase tracking-widest hover:bg-plum hover:text-white transition-all">
                Support Work

            <!-- Mobile Hamburger Toggle (Visible only on mobile, placed in z-[110] to stay above overlay) -->
            <button id="menu-toggle" class="md:hidden text-white hover:text-plum focus:outline-none transition-colors p-2 text-xl z-[110]" aria-label="Toggle Menu">
                <i id="menu-icon" class="fas fa-bars transition-all duration-300"></i>

    </nav>

    <!-- Full-Screen Mobile Glassmorphic Overlay -->

        <!-- Glowing Ambient Background Spots inside Menu for dynamic Glassmorphic effect -->
        <div class="absolute top-[10%] left-[5%] w-[300px] h-[300px] bg-plum/10 blur-[100px] rounded-full pointer-events-none"></div>
        <div class="absolute bottom-[10%] right-[5%] w-[300px] h-[300px] bg-indigo-900/10 blur-[100px] rounded-full pointer-events-none"></div>
        
        <!-- Mobile Links Stack (Aligned center-middle) -->
        <div class="flex flex-col items-center justify-center space-y-4 w-full max-w-sm px-6 relative z-10 py-10">
            
            <a href="/" class="group flex items-center justify-between w-full px-6 py-4 rounded-[1.25rem] glass-card border-white/5 hover:border-plum/30 transition-all duration-300 hover:scale-[1.03] hover:bg-white/[0.02]">
                <div class="flex items-center gap-4">
                    <span class="text-[10px] font-mono font-bold text-plum/60 tracking-wider">01 /</span>
                    <span class="text-base font-bold uppercase tracking-[0.15em] text-white/70 group-hover:text-plum transition-colors">Home</span>
                </div>
                <i class="fas fa-chevron-right text-white/20 group-hover:text-plum group-hover:translate-x-1 transition-all text-sm"></i>
            </a>

            <a href="/projects" class="group flex items-center justify-between w-full px-6 py-4 rounded-[1.25rem] glass-card border-white/5 hover:border-plum/30 transition-all duration-300 hover:scale-[1.03] hover:bg-white/[0.02]">
                <div class="flex items-center gap-4">
                    <span class="text-[10px] font-mono font-bold text-plum/60 tracking-wider">02 /</span>
                    <span class="text-base font-bold uppercase tracking-[0.15em] text-white/70 group-hover:text-plum transition-colors">Projects</span>
                </div>
                <i class="fas fa-chevron-right text-white/20 group-hover:text-plum group-hover:translate-x-1 transition-all text-sm"></i>

            <a href="/stats" class="group flex items-center justify-between w-full px-6 py-4 rounded-[1.25rem] glass-card border-white/5 hover:border-plum/30 transition-all duration-300 hover:scale-[1.03] hover:bg-white/[0.02]">
                <div class="flex items-center gap-4">
                    <span class="text-[10px] font-mono font-bold text-plum/60 tracking-wider">03 /</span>
                    <span class="text-base font-bold uppercase tracking-[0.15em] text-white/70 group-hover:text-plum transition-colors">Stats</span>
                </div>

            <a href="/achievements" class="group flex items-center justify-between w-full px-6 py-4 rounded-[1.25rem] glass-card border-white/5 hover:border-plum/30 transition-all duration-300 hover:scale-[1.03] hover:bg-white/[0.02]">
                <div class="flex items-center gap-4">
                    <span class="text-[10px] font-mono font-bold text-plum/60 tracking-wider">04 /</span>
                    <span class="text-base font-bold uppercase tracking-[0.15em] text-white/70 group-hover:text-plum transition-colors">Milestones</span>

            <a href="/gallery" class="group flex items-center justify-between w-full px-6 py-4 rounded-[1.25rem] glass-card border-white/5 hover:border-plum/30 transition-all duration-300 hover:scale-[1.03] hover:bg-white/[0.02]">
                <div class="flex items-center gap-4">
                    <span class="text-[10px] font-mono font-bold text-plum/60 tracking-wider">05 /</span>
                    <span class="text-base font-bold uppercase tracking-[0.15em] text-white/70 group-hover:text-plum transition-colors">Gallery</span>
                </div>
                <i class="fas fa-chevron-right text-white/20 group-hover:text-plum group-hover:translate-x-1 transition-all text-sm"></i>
            </a>

            <a href="https://linkify-nine-kappa.vercel.app/" target="_blank" rel="noopener noreferrer" class="group flex items-center justify-between w-full px-6 py-4 rounded-[1.25rem] glass-card border-white/5 hover:border-plum/30 transition-all duration-300 hover:scale-[1.03] hover:bg-white/[0.02]">
                <div class="flex items-center gap-4">
                    <span class="text-[10px] font-mono font-bold text-plum/60 tracking-wider">06 /</span>

            <a href="/coffee" target="_blank" class="w-full glass-pill text-plum text-center py-4 rounded-[1.25rem] text-[11px] font-black uppercase tracking-[0.2em] hover:bg-plum hover:text-white transition-all shadow-2xl mt-6 border border-plum/30 flex items-center justify-center gap-2 hover:scale-[1.03]">

    <main>{% block content %}{% endblock %}</main>

    <footer class="py-20 px-10 border-t border-white/5 text-center">
        <p class="text-white/20 text-[10px] uppercase tracking-[0.4em]">© 2026 Founder of Hoollow</p>
    </footer>

    <script>
        // Mobile Hamburger Menu Toggle Logic (Full-Screen Glass Overlay)
        document.addEventListener('DOMContentLoaded', () => {
            const menuToggle = document.getElementById('menu-toggle');
            const mobileOverlay = document.getElementById('mobile-overlay');
            const menuIcon = document.getElementById('menu-icon');
            
            if (menuToggle && mobileOverlay && menuIcon) {
                menuToggle.addEventListener('click', () => {
                    const isClosed = mobileOverlay.classList.contains('hidden');
                    if (isClosed) {
                        // Open Overlay Menu
                        mobileOverlay.classList.remove('hidden');
                        mobileOverlay.classList.add('flex');
                        // Force brief reflow and trigger high-performance fade transition
                        setTimeout(() => {
                            mobileOverlay.classList.add('opacity-100');
                            mobileOverlay.classList.remove('opacity-0');
                        }, 10);
                        menuIcon.className = 'fas fa-times transition-all duration-300 rotate-90';
                        document.body.style.overflow = 'hidden'; // Lock background scrolling
                    } else {
                        // Close Overlay Menu
                        mobileOverlay.classList.add('opacity-0');
                        mobileOverlay.classList.remove('opacity-100');
                        // Delay hidden to allow transition to play
                        setTimeout(() => {
                            if (mobileOverlay.classList.contains('opacity-0')) {
                                mobileOverlay.classList.add('hidden');
                                mobileOverlay.classList.remove('flex');
                            }
                        }, 500);
                        menuIcon.className = 'fas fa-bars transition-all duration-300';
                        document.body.style.overflow = ''; // Unlock background scrolling
                    }
                });
            }
        });

        function copyCloneLink(link, button) {
            navigator.clipboard.writeText(link).then(() => {
                const originalText = button.textContent;
                button.textContent = 'Copied cloning link';
                button.style.backgroundColor = 'var(--plum)';
                button.style.color = 'black';
                
                setTimeout(() => {
                    button.textContent = originalText;
                    button.style.backgroundColor = '';
                    button.style.color = '';
                }, 2000);
            });
        }
    </script>
</body>
</html>
